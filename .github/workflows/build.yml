name: Auto-Build Database

on:
  schedule:
    # Si attiva automaticamente ogni 4 ore (minuto 0 di ogni 4 ore)
    - cron: '0 */4 * * *'
  workflow_dispatch:
    # Ti permette comunque di farlo partire a mano se vuoi fare un test

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install google-genai

      - name: Run Database Builder
        run: python build_db.py

      - name: Commit & Push
        run: |
          git config user.name "Bot-Auto-Tuning"
          git config user.email "bot@tuning.com"
          # Controlla se la cartella brands esiste prima di fare l'add
          if [ -d "brands" ]; then
            git add brands/
            git commit -m "Auto-aggiornamento: dati tuning aggiornati" && git push || echo "Nessuna modifica da caricare"
          else
            echo "La cartella brands non esiste ancora (nessun file generato in questo turno)."
          fi
