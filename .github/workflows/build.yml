name: Build Car Database

on:
  push:
    paths:
      - 'master_list.json' # Si attiva SOLO quando modifichi la lista
  workflow_dispatch: # Permette di avviarlo a mano

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install duckduckgo-search

    - name: Run Python Builder
      run: python build_db.py

    - name: Commit and Push Changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add brands/
        git commit -m "🤖 Auto-generated folders and added car images" || echo "No changes to commit"
        git push
