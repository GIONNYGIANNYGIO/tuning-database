on:
  schedule:
    - cron: "0 * * * *" # Gira automaticamente ogni ora
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with: {python-version: '3.9'}
      - run: pip install google-generativeai
      - run: python enrich_db.py
      - name: Commit & Push
        run: |
          git config user.name "Bot-Auto-Tuning"
          git config user.email "bot@tuning.com"
          git add .
          git commit -m "Auto-aggiornamento database auto" || echo "Nessuna modifica"
          git push
